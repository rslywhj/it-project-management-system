server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    # SQL日志：生产环境使用slf4j（需配合logback配置），开发环境在application-dev.yml中覆盖为StdOutImpl

# SpringDoc
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# JWT — secret MUST be provided via JWT_SECRET environment variable (no default fallback)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# CORS — allowed origins (comma-separated, production must set via CORS_ALLOWED_ORIGINS env var)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging:
  level:
    com.pm: INFO
    org.springframework.security: WARN
