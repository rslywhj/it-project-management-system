server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# JWT
jwt:
  secret: ${JWT_SECRET:ThisIsADefaultSecretKeyForDevelopmentOnlyMustBe256BitsLong!!}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# CORS（生产环境请配置为实际部署域名）
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://111.229.200.159

# Logging
logging:
  level:
    com.pm: DEBUG
    org.springframework.security: DEBUG
