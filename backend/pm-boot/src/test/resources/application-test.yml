spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# Disable JWT validation for tests
jwt:
  secret: TestSecretKeyMustBe256BitsLongForHS256Algorithm!!
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# CORS
cors:
  allowed-origins: http://localhost:3000

# Logging
logging:
  level:
    com.pm: DEBUG
    org.springframework.security: WARN

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
