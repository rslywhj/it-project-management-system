# 本地开发配置覆盖
# 使用方法: docker compose up -d
# 此文件会自动覆盖 docker-compose.yml 中的配置

services:
  backend:
    # 开发环境暴露8080端口
    ports:
      - "8080:8080"

  mysql:
    # 开发环境暴露3306端口
    ports:
      - "3306:3306"

  redis:
    # 开发环境暴露6379端口
    ports:
      - "6379:6379"

  minio:
    # 开发环境暴露9000/9001端口
    ports:
      - "9000:9000"
      - "9001:9001"
